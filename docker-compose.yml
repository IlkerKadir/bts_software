services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bts_user
      POSTGRES_PASSWORD: bts_password
      POSTGRES_DB: bts_teklif
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bts_user -d bts_teklif"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://bts_user:bts_password@db:5432/bts_teklif?schema=public"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      CRON_SECRET: "${CRON_SECRET:?Set CRON_SECRET in .env}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
